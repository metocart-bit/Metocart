<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Metocart – IT Consulting & Digital Transformation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050A14;
      --surface: #0C1526;
      --surface2: #111E35;
      --accent: #00C8FF;
      --accent2: #0057FF;
      --gold: #F5A623;
      --text: #E8EEF8;
      --muted: #7A8BAD;
      --border: rgba(0,200,255,0.12);
      --glow: 0 0 40px rgba(0,200,255,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.5;
    }

    /* ── GRID BACKGROUND ── */
    .grid-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw;
      height: 72px;
      background: rgba(5,10,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex; gap: 2.5rem; list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    .nav-cta {
      padding: 0.5rem 1.4rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .nav-cta:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 20px rgba(0,200,255,0.3);
    }
    @media (max-width: 768px) { .nav-cta { display: none; } }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 100px 10vw 60px;
      overflow: hidden;
    }

    /* Orb backgrounds */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(100px); pointer-events: none;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,87,255,0.25) 0%, transparent 70%);
      top: -100px; right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,200,255,0.15) 0%, transparent 70%);
      bottom: 0; left: 5vw;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-30px); }
    }

    .hero-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
      opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
    }
    .hero-eyebrow::before {
      content: '';
      display: inline-block; width: 32px; height: 1px;
      background: var(--accent);
    }

    .hero-headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 7vw, 6.5rem);
      line-height: 1.0;
      letter-spacing: -0.03em;
      max-width: 900px;
      margin-bottom: 1.5rem;
      opacity: 0; animation: fadeUp 0.8s 0.4s forwards;
    }

    .hero-headline .line-accent { color: var(--accent); }
    .hero-headline .line-dim { color: var(--muted); }

    .hero-sub {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 520px;
      margin-bottom: 2.5rem;
      font-weight: 300;
      opacity: 0; animation: fadeUp 0.8s 0.6s forwards;
    }

    .hero-actions {
      display: flex; gap: 1rem; flex-wrap: wrap;
      opacity: 0; animation: fadeUp 0.8s 0.8s forwards;
    }

    .btn-primary {
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      border: none; border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 4px 24px rgba(0,200,255,0.25);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,200,255,0.4);
    }

    .btn-ghost {
      padding: 0.85rem 2rem;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Stats bar */
    .stats-bar {
      position: relative; z-index: 1;
      display: flex; gap: 0; flex-wrap: wrap;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: rgba(12,21,38,0.7);
      backdrop-filter: blur(10px);
    }

    .stat-item {
      flex: 1; min-width: 180px;
      padding: 2rem 3rem;
      border-right: 1px solid var(--border);
      opacity: 0; animation: fadeUp 0.6s forwards;
    }
    .stat-item:last-child { border-right: none; }
    .stat-item:nth-child(1) { animation-delay: 1s; }
    .stat-item:nth-child(2) { animation-delay: 1.1s; }
    .stat-item:nth-child(3) { animation-delay: 1.2s; }
    .stat-item:nth-child(4) { animation-delay: 1.3s; }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTIONS ── */
    section {
      position: relative; z-index: 1;
      padding: 100px 10vw;
    }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .section-label::before {
      content: ''; display: inline-block;
      width: 24px; height: 1px; background: var(--accent);
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .section-desc {
      color: var(--muted);
      max-width: 560px;
      font-size: 1rem;
      margin-bottom: 4rem;
    }

    /* ── SERVICES ── */
    #services { background: var(--surface); }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .service-card {
      background: var(--surface);
      padding: 2.5rem;
      cursor: default;
      transition: background 0.3s;
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 0;
      background: var(--accent);
      transition: height 0.4s ease;
    }
    .service-card:hover { background: var(--surface2); }
    .service-card:hover::before { height: 100%; }

    .service-icon {
      width: 52px; height: 52px;
      border-radius: 8px;
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,200,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .service-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
    }

    .service-desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .service-tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .tag {
      font-size: 0.7rem;
      padding: 0.25rem 0.6rem;
      background: rgba(0,200,255,0.06);
      border: 1px solid rgba(0,200,255,0.15);
      border-radius: 2px;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── WHY US ── */
    #why { background: var(--bg); }

    .why-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
    }

    .why-visual {
      position: relative;
    }

    .tech-stack-visual {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .tech-stack-visual::after {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      background: linear-gradient(135deg, var(--accent2) 0%, transparent 50%);
      opacity: 0.08;
      border-radius: 8px;
      pointer-events: none;
    }

    .stack-row {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;
    }

    .stack-chip {
      padding: 0.5rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.2s;
    }
    .stack-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,200,255,0.06);
    }

    .why-points {
      display: flex; flex-direction: column; gap: 2rem;
    }

    .why-point {
      display: flex; gap: 1.5rem; align-items: flex-start;
    }

    .why-num {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      padding-top: 0.25rem;
      min-width: 2.5rem;
    }

    .why-point-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .why-point-desc {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    /* ── PROCESS ── */
    #process { background: var(--surface); }

    .process-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0;
      border: 1px solid var(--border);
      position: relative;
    }

    .process-steps::after {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0.2;
    }

    .step {
      padding: 2.5rem;
      border-right: 1px solid var(--border);
      position: relative;
    }
    .step:last-child { border-right: none; }

    .step-num {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: rgba(0,200,255,0.08);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .step-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .step-desc {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    /* ── CTA ── */
    #contact {
      background: var(--bg);
      text-align: center;
    }

    .cta-box {
      max-width: 680px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .cta-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top, rgba(0,87,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .cta-box .section-title { margin-bottom: 1rem; }

    .cta-box p {
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .contact-form {
      display: flex; flex-direction: column; gap: 1rem;
      text-align: left;
    }

    .form-row { display: flex; gap: 1rem; }

    .form-group {
      display: flex; flex-direction: column; gap: 0.4rem;
      flex: 1;
    }

    .form-group label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group select option { background: var(--surface); }

    .form-group textarea { resize: vertical; min-height: 100px; }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 1;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 4rem 10vw 2rem;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .footer-brand .nav-logo {
      display: inline-block; margin-bottom: 1rem;
    }

    .footer-brand p {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.7;
      max-width: 280px;
    }

    .footer-col h4 {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text);
      margin-bottom: 1.2rem;
    }

    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; }

    .footer-col ul a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .footer-col ul a:hover { color: var(--accent); }

    .footer-bottom {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .footer-bottom a { color: var(--accent); text-decoration: none; }

    /* ── TICKER ── */
    .ticker-wrap {
      overflow: hidden;
      background: rgba(0,200,255,0.04);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0;
      white-space: nowrap;
      position: relative; z-index: 1;
    }

    .ticker-track {
      display: inline-block;
      animation: ticker 30s linear infinite;
    }

    .ticker-item {
      display: inline-block;
      padding: 0 2.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .ticker-item span { color: var(--accent); margin-right: 0.5rem; }

    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* ── ZERO DOWNTIME SECTION ── */
    .zd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .zd-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.5rem;
    }

    .zd-featured {
      border-color: rgba(0,200,255,0.3);
      box-shadow: 0 0 40px rgba(0,200,255,0.06);
    }

    .zd-icon-row { margin-bottom: 1.2rem; }

    .zd-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,200,255,0.2);
      padding: 0.3rem 0.8rem;
      border-radius: 2px;
    }
    .zd-badge::before {
      content: '●';
      font-size: 0.6rem;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .zd-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 0.75rem;
    }

    .zd-desc {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .zd-pillars { display: flex; flex-direction: column; gap: 1.25rem; }

    .zd-pillar {
      display: flex; gap: 1rem; align-items: flex-start;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .zd-pillar:last-child { border-bottom: none; padding-bottom: 0; }

    .zd-pillar-icon {
      font-size: 1.2rem;
      min-width: 2rem;
      text-align: center;
      padding-top: 0.1rem;
    }

    .zd-pillar strong {
      display: block;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 0.2rem;
      color: var(--text);
    }

    .zd-pillar p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Right column */
    .zd-right { display: flex; flex-direction: column; gap: 1.5rem; }

    .zd-metric-card, .zd-checklist-card, .zd-pulse-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.75rem;
    }

    .zd-metric-header {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .zd-bars { display: flex; flex-direction: column; gap: 1rem; }

    .zd-bar-row {
      display: grid;
      grid-template-columns: 1fr 2fr auto;
      align-items: center; gap: 0.75rem;
    }

    .zd-bar-label { font-size: 0.78rem; color: var(--muted); }

    .zd-bar-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .zd-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px;
      animation: barGrow 1.5s ease forwards;
    }
